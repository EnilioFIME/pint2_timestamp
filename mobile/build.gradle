// Módulo Android (nivel carpeta mobile/)
// Nota: Este archivo es una base mínima. El proyecto Android completo normalmente incluye
// gradle wrapper (`gradlew`), `settings.gradle` y un `app/build.gradle`.

buildscript {
    ext.kotlin_version = '1.9.24'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
